<!doctype html>
<html lang="en">

    <link rel="stylesheet" href="./scss/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header__wrap">
        <div class="logo">BidBuy</div>

        <div class="hero__right">

      </div>
    </section>
